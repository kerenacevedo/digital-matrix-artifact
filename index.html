<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F3D6E" />
  <title>Diagnóstico de Madurez Digital y AI — Fundación V2A</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #185FA5;
      --primary-dark:  #0F3D6E;
      --primary-light: #EAF3FC;
      --n1-text: #B34826; --n1-bg: #FEF0EB;
      --n2-text: #8A5210; --n2-bg: #FEF7EC;
      --n3-text: #356010; --n3-bg: #F0F8E6;
      --n4-text: #0F4D8A; --n4-bg: #EAF3FC;
      --gray-50:  #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
      --gray-400: #9CA3AF; --gray-500: #6B7280; --gray-700: #374151; --gray-900: #111827;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px; line-height: 1.55; color: var(--gray-900);
      background: var(--gray-50); min-height: 100vh; -webkit-text-size-adjust: 100%;
    }

    /* ── Header ── */
    .app-header {
      background: var(--primary-dark); color: #fff;
      padding: 20px 20px 14px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .header-inner { text-align: center; }
    .header-logo { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.72; margin-bottom: 3px; }
    .header-title { font-size: 17px; font-weight: 700; line-height: 1.25; }
    @media (min-width: 480px) { .header-title { font-size: 19px; } }

    /* Progress */
    .progress-wrap { margin-top: 10px; padding-bottom: 12px; display: none; }
    .progress-track { background: rgba(255,255,255,0.25); height: 5px; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #fff; border-radius: 3px; transition: width 0.4s cubic-bezier(.4,0,.2,1); width: 0%; }
    .progress-text { font-size: 11px; opacity: 0.68; margin-top: 5px; text-align: right; }

    /* ── Layout ── */
    .main { max-width: 620px; margin: 0 auto; padding: 24px 16px 56px; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Welcome ── */
    .welcome-card { background: #fff; border-radius: 20px; padding: 32px 24px 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); text-align: center; }
    .welcome-emoji { display: none; }
    .welcome-card h2 { font-size: 21px; font-weight: 800; color: var(--primary); line-height: 1.3; margin-bottom: 12px; }
    .welcome-card > p { font-size: 15px; color: var(--gray-700); margin-bottom: 18px; }
    .dim-list { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 12px; padding: 14px 18px; margin: 0 0 20px; text-align: left; }
    .dim-list li { list-style: none; padding: 5px 0; font-size: 15px; color: var(--gray-700); display: flex; align-items: center; gap: 10px; }
    .dim-list li::before { content: '→'; color: var(--primary); font-weight: 700; flex-shrink: 0; }
    .welcome-meta { font-size: 13px; color: var(--gray-400); margin-bottom: 18px; }
    .org-input-wrap { margin-bottom: 18px; text-align: left; }
    .org-input-label { font-size: 13px; font-weight: 700; color: var(--gray-700); margin-bottom: 6px; display: block; }
    .org-input { width: 100%; padding: 14px 16px; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 16px; outline: none; transition: border-color 0.18s; background: #fff; color: var(--gray-900); }
    .org-input:focus { border-color: var(--primary); }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 15px 28px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; transition: background 0.18s, transform 0.15s; min-height: 52px; width: 100%; text-decoration: none; -webkit-tap-highlight-color: transparent; user-select: none; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:not(:disabled):hover { background: var(--primary-dark); }
    .btn-primary:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; transform: none; }
    .btn-secondary { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
    .btn-secondary:not(:disabled):hover { background: var(--primary-light); }
    .btn-ghost { background: #fff; color: var(--gray-700); border: 2px solid var(--gray-200); width: auto; padding: 15px 20px; flex-shrink: 0; }

    /* ── Step ── */
    .step-header { margin-bottom: 18px; }
    .step-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--primary-light); color: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-bottom: 10px; }
    .step-header h2 { font-size: 22px; font-weight: 800; color: var(--gray-900); line-height: 1.25; margin-bottom: 4px; }
    .step-hint { font-size: 14px; color: var(--gray-500); }
    /* Mobile: 1 column stacked */
    .levels-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 22px; }

    /* Tablet 560px+: 2 columns */
    @media (min-width: 560px) {
      .levels-grid { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    }

    /* Base (mobile) card text sizes — must come BEFORE the desktop media query */
    .lvl-name { font-size: 14px; font-weight: 700; color: var(--gray-900); margin-bottom: 3px; }
    .lvl-desc { font-size: 13px; color: var(--gray-700); line-height: 1.45; }
    .lvl-examples { margin-top: 8px; padding-left: 14px; }
    .lvl-examples li { font-size: 13px; color: var(--gray-500); line-height: 1.5; margin-bottom: 3px; }

    /* Desktop 820px+: wider container + horizontal card layout + 2x text */
    @media (min-width: 820px) {
      .main { max-width: 1400px; padding-left: 32px; padding-right: 32px; }
      /* Card layout */
      .level-card { display: flex; flex-direction: row; align-items: flex-start; gap: 10px; padding: 24px 52px 24px 24px; }
      .lvl-card-left { flex-shrink: 0; width: 140px; }
      .lvl-badge { white-space: nowrap; font-size: 16px; padding: 5px 14px; }
      .lvl-card-right { flex: 1; min-width: 0; }
      /* Card text — escala dinámicamente con ancho Y alto de pantalla */
      .lvl-name { font-size: clamp(16px, min(3vh, 2vw), 26px); }
      .lvl-desc { font-size: clamp(14px, min(2.5vh, 1.6vw), 22px); line-height: 1.5; }
      .lvl-examples { margin-top: clamp(4px, 0.6vh, 10px); }
      .lvl-examples li { font-size: clamp(14px, min(2.5vh, 1.6vw), 22px); line-height: 1.6; }
    }
    .step-nav { display: flex; gap: 8px; align-items: stretch; }
    .step-nav .btn-primary { flex: 1; }
    @media (max-width: 480px) {
      .step-nav .btn { padding: 12px 12px; font-size: 14px; min-height: 44px; }
      .step-nav .btn-ghost { padding: 12px 12px; }
      .step-nav .btn-na { padding: 12px 10px !important; font-size: 14px !important; min-height: 44px !important; }
    }
    .btn-na { background:#fff; border:2px solid var(--gray-200); color:var(--gray-500); border-radius:12px; font-size:16px; font-weight:700; padding:15px 16px; min-height:52px; cursor:pointer; white-space:nowrap; transition:background 0.15s,border-color 0.15s,color 0.15s; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
    .btn-na.active-na { background:var(--gray-100); border-color:var(--gray-400); color:var(--gray-700); }
    .level-card.na-dimmed { opacity:0.3; pointer-events:none; }
    .dim-result.na-result { background:#F9FAFB; border:1.5px dashed var(--gray-200); }
    .na-badge { display:inline-block; background:var(--gray-100); color:var(--gray-500); border-radius:20px; font-size:11px; font-weight:700; padding:2px 10px; letter-spacing:0.05em; }

    /* ── Level cards ── */
    .level-card { background: #fff; border: 2.5px solid var(--gray-200); border-radius: 14px; padding: 12px 36px 12px 13px; cursor: pointer; transition: border-color 0.18s, box-shadow 0.18s, background 0.18s; position: relative; -webkit-tap-highlight-color: transparent; user-select: none; }
    .level-card:hover { border-color: var(--primary); box-shadow: 0 3px 12px rgba(24,95,165,0.12); }
    .level-card.sel-n1 { background: var(--n1-bg); border-color: var(--n1-text); }
    .level-card.sel-n2 { background: var(--n2-bg); border-color: var(--n2-text); }
    .level-card.sel-n3 { background: var(--n3-bg); border-color: var(--n3-text); }
    .level-card.sel-n4 { background: var(--n4-bg); border-color: var(--n4-text); }
    .check-circle { position: absolute; top: 14px; right: 14px; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; opacity: 0; transition: opacity 0.15s; }
    .level-card.sel-n1 .check-circle { background: var(--n1-text); opacity: 1; }
    .level-card.sel-n2 .check-circle { background: var(--n2-text); opacity: 1; }
    .level-card.sel-n3 .check-circle { background: var(--n3-text); opacity: 1; }
    .level-card.sel-n4 .check-circle { background: var(--n4-text); opacity: 1; }
    .lvl-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .lvl-badge.n1 { background: var(--n1-bg); color: var(--n1-text); }
    .lvl-badge.n2 { background: var(--n2-bg); color: var(--n2-text); }
    .lvl-badge.n3 { background: var(--n3-bg); color: var(--n3-text); }
    .lvl-badge.n4 { background: var(--n4-bg); color: var(--n4-text); }
    /* ── Results ── */
    .score-hero { background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%); color: #fff; border-radius: 20px; padding: 28px 24px 24px; text-align: center; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(15,61,110,0.25); }
    .score-eyebrow { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.72; margin-bottom: 6px; }
    .score-number { font-size: 62px; font-weight: 900; line-height: 1; }
    .score-denom  { font-size: 22px; font-weight: 600; opacity: 0.65; }
    .score-stage { display: inline-block; background: rgba(255,255,255,0.2); font-size: 18px; font-weight: 800; padding: 7px 20px; border-radius: 24px; margin-top: 10px; }
    .score-brand { font-size: 12px; opacity: 0.55; margin-top: 10px; }
    .chart-card { background: #fff; border-radius: 16px; padding: 20px 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 15px; font-weight: 700; color: var(--gray-900); margin-bottom: 14px; text-align: center; }
    .chart-inner { position: relative; width: 100%; margin: 0 auto; height: 300px; }
    .section-heading { font-size: 17px; font-weight: 800; color: var(--gray-900); margin-bottom: 12px; }
    .dim-result { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
    .dim-result-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .dim-result-name { font-size: 15px; font-weight: 700; color: var(--gray-900); line-height: 1.3; }
    .dim-score-chip { flex-shrink: 0; padding: 4px 11px; border-radius: 20px; font-size: 12px; font-weight: 800; white-space: nowrap; }
    .mini-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gray-400); margin-bottom: 3px; }
    .mini-text { font-size: 14px; color: var(--gray-700); line-height: 1.5; }
    .mini-divider { height: 1px; background: var(--gray-100); margin: 10px 0; }
    .callout-block { background: var(--primary-light); border-left: 4px solid var(--primary); border-radius: 0 12px 12px 0; padding: 16px 18px; margin: 20px 0 4px; }
    .callout-block p { font-size: 15px; font-style: italic; color: var(--primary-dark); line-height: 1.55; font-weight: 600; }

    /* ── Actions ── */
    .actions-section { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--gray-200); }
    .actions-heading { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--gray-900); }
    .email-row { display: flex; flex-direction: column; gap: 10px; }
    .email-row input { padding: 15px 16px; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 16px; outline: none; transition: border-color 0.18s; width: 100%; background: #fff; }
    .email-row input:focus { border-color: var(--primary); }
    .question-block { margin-bottom: 18px; }
    .question-label { font-size: 14px; font-weight: 700; color: var(--gray-700); margin-bottom: 8px; display: block; line-height: 1.4; }
    .question-textarea { width: 100%; padding: 14px 16px; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 15px; font-family: inherit; outline: none; resize: vertical; min-height: 90px; transition: border-color 0.18s; background: #fff; color: var(--gray-900); }
    .question-textarea:focus { border-color: var(--primary); }
    .email-section-label { font-size: 13px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; display: block; }
    .branding-footer { text-align: center; margin-top: 28px; padding: 16px; color: var(--gray-400); font-size: 13px; line-height: 1.7; }

    /* ── Thank-you ── */
    .thankyou-card { background: var(--primary-light); border-radius: 20px; padding: 36px 24px 32px; text-align: center; }
    .thankyou-icon { font-size: 52px; line-height: 1; margin-bottom: 14px; }
    .thankyou-title { font-size: 22px; font-weight: 800; color: var(--primary-dark); margin-bottom: 10px; }
    .thankyou-msg { font-size: 15px; color: var(--gray-700); line-height: 1.65; margin-bottom: 28px; }

    /* ── Toast & Loading ── */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(8px); background: #1a1a2e; color: #fff; padding: 13px 24px; border-radius: 14px; font-size: 15px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.28s ease, transform 0.28s ease; max-width: 88vw; text-align: center; pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(15,61,110,0.55); z-index: 500; align-items: center; justify-content: center; flex-direction: column; gap: 16px; color: #fff; font-size: 16px; font-weight: 700; }
    .loading-overlay.show { display: flex; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-logo" id="cfg-header-logo"></div>
    <h1 class="header-title">Diagnóstico de Madurez Digital y AI</h1>
  </div>
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text"></div>
  </div>
</header>

<main class="main">

  <!-- WELCOME -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome-card">
      <div class="welcome-emoji" id="cfg-welcome-emoji"></div>
      <h2 id="cfg-welcome-title"></h2>
      <p id="cfg-welcome-subtitle"></p>
      <ul class="dim-list" id="cfg-dim-list"></ul>
      <p class="welcome-meta" id="cfg-welcome-meta"></p>
      <div class="org-input-wrap">
        <label class="org-input-label" id="cfg-org-label" for="org-name-input"></label>
        <input type="text" id="org-name-input" class="org-input" maxlength="60" autocomplete="organization" />
      </div>
      <button class="btn btn-primary" id="cfg-start-btn" onclick="startAssessment()"></button>
    </div>
  </div>

  <!-- ASSESSMENT -->
  <div id="screen-assessment" class="screen">
    <div class="step-header">
      <div class="step-pill">
        <span id="step-icon">📋</span>
        <span id="step-counter"></span>
      </div>
      <h2 id="step-title"></h2>
      <p class="step-hint" id="cfg-step-hint"></p>
    </div>
    <div class="levels-grid" id="levels-grid"></div>
    <div class="step-nav">
      <button class="btn btn-ghost" id="btn-back" onclick="goBack()"></button>
      <button class="btn-na" id="btn-na" onclick="selectNA()">No aplica</button>
      <button class="btn btn-primary" id="btn-next" onclick="goNext()" disabled></button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="screen">
    <div id="results-section">
      <div class="score-hero">
        <div class="score-eyebrow" id="cfg-score-eyebrow"></div>
        <div>
          <span class="score-number" id="overall-score">0.0</span>
          <span class="score-denom"> / 4.0</span>
        </div>
        <div class="score-stage" id="stage-label">—</div>
      </div>
      <div class="chart-card">
        <div class="card-title" id="cfg-chart-title"></div>
        <div class="chart-inner"><canvas id="radar-chart"></canvas></div>
      </div>
      <div class="section-heading" id="cfg-dim-heading"></div>
      <div id="dimension-results"></div>
      <div class="callout-block"><p id="cfg-quote"></p></div>
    </div>

    <div class="actions-section">
      <div id="form-block">
        <div class="actions-heading" id="cfg-actions-heading"></div>
        <div class="question-block">
          <label class="question-label" for="q1-input">1. ¿Qué tarea te consume más tiempo?</label>
          <textarea id="q1-input" class="question-textarea" rows="3"></textarea>
        </div>
        <div class="question-block">
          <label class="question-label" for="q2-input">2. Si tuvieras una varita mágica para eliminar una tarea de tu día a día, ¿cuál sería?</label>
          <textarea id="q2-input" class="question-textarea" rows="3"></textarea>
        </div>
        <span class="email-section-label">Recibe tus resultados por correo</span>
        <div class="email-row">
          <input type="email" id="email-input" autocomplete="email" />
          <button class="btn btn-secondary" id="btn-email" onclick="sendEmail()"></button>
        </div>
      </div>
      <div id="thank-you-block" style="display:none;">
        <div class="thankyou-card">
          <div class="thankyou-icon">✅</div>
          <h3 class="thankyou-title">¡Gracias por participar!</h3>
          <p class="thankyou-msg">Tu reporte de madurez digital fue enviado a tu correo electrónico. Revisa tu bandeja en los próximos minutos.</p>
          <button class="btn btn-primary" onclick="restartAssessment()">🔄 Nuevo diagnóstico</button>
        </div>
      </div>
      <button class="btn btn-ghost" id="cfg-restart-btn" onclick="restartAssessment()" style="width:100%;margin-top:14px;"></button>
    </div>
    <div class="branding-footer" id="cfg-branding"></div>
  </div>

</main>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">Generando PDF…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// ════════════════════════════════════════════════════════════════
//  ✏️  CONFIGURACIÓN — edita aquí todos los textos de la app
// ════════════════════════════════════════════════════════════════
const CONFIG = {

  // ── Identidad ────────────────────────────────────────────────
  brand:    'Fundación V2A',
  workshop: 'AI for Nonprofits Workshop 2026',

  // ── Pantalla de bienvenida ───────────────────────────────────
  welcomeEmoji:    '🔍',
  welcomeTitle:    '¿Qué tan digital y preparada para AI está tu organización?',
  welcomeSubtitle: 'Este diagnóstico evalúa el nivel de madurez digital y de inteligencia artificial de tu organización sin fines de lucro en 6 dimensiones clave.',
  welcomeMeta:     '⏱ Menos de 5 minutos · Resultados inmediatos · Sin registro',
  orgLabel:        'Nombre de tu organización',
  orgPlaceholder:  'Ej. Fundación Esperanza',
  startBtn:        'Comenzar diagnóstico →',

  // ── Navegación del diagnóstico ───────────────────────────────
  stepHint:    'Selecciona el nivel que mejor describe a tu organización hoy',
  btnBack0:    '← Inicio',
  btnBackN:    '← Atrás',
  btnNext:     'Siguiente →',
  btnFinish:   'Ver resultados →',

  // ── Pantalla de resultados ───────────────────────────────────
  resultsEyebrow:  'Tu nivel de madurez digital y AI',
  chartTitle:      '📊 Resultados de Madurez Digital',
  dimSectionTitle: '📋 Detalle por dimensión',
  todayLabel:      'Dónde estás hoy',
  nextStepLabel:   'Próximo paso',
  maxLevelMsg:     'Ya alcanzaste el nivel máximo en esta dimensión. ¡Excelente trabajo!',
  footerQuote:     '"No necesitas transformar toda tu organización hoy. Empieza con un caso de uso que genere valor."',

  // ── Etiquetas de etapa (avg debe ser MENOR que max para aplicar) ──
  stages: [
    { max: 2,   label: 'Etapa inicial' },
    { max: 3,   label: 'En desarrollo' },
    { max: 3.5, label: 'Avanzando' },
    { max: 5,   label: 'Organización inteligente' },
  ],

// ── Helpers ──────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $('screen-' + id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setProgress(step) {
  $('progress-fill').style.width = (step / DIMS.length * 100) + '%';
  const groups = [0, 1, 2, 2, 3, 4, 5, 6][step] ?? 6;
  $('progress-text').textContent = `${groups} de 6 completadas`;
}

function showToast(msg, ms = 3200) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function showLoading(msg = 'Generando PDF…') { $('loading-text').textContent = msg; $('loading-overlay').classList.add('show'); }
function hideLoading() { $('loading-overlay').classList.remove('show'); }

function getStageLabel(avg) {
  for (const s of CONFIG.stages) { if (avg < s.max) return s.label; }
  return CONFIG.stages[CONFIG.stages.length - 1].label;
}

// ── Navegación ───────────────────────────────────────────────────
function startAssessment() {
  orgName     = ($('org-name-input').value || '').trim();
  currentStep = 0;
  selections  = new Array(DIMS.length).fill(null);
  $('progress-wrap').style.display = 'block';
  showScreen('assessment');
  renderStep();
}

function goBack() {
  if (currentStep === 0) {
    $('progress-wrap').style.display = 'none';
    showScreen('welcome');
  } else {
    currentStep--;
    renderStep();
  }
}

function goNext() {
  if (selections[currentStep] === null) return;
  if (currentStep < DIMS.length - 1) { currentStep++; renderStep(); }
  else showResultsScreen();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartAssessment() {
  if (radarChart) { radarChart.destroy(); radarChart = null; }
  $('form-block').style.display = 'block';
  $('thank-you-block').style.display = 'none';
  $('cfg-restart-btn').style.display = '';
  $('q1-input').value = '';
  $('q2-input').value = '';
  $('email-input').value = '';
  currentStep = 0;
  selections  = new Array(DIMS.length).fill(null);
  $('progress-wrap').style.display = 'none';
  showScreen('welcome');
}

// ── Render step ──────────────────────────────────────────────────
function renderStep() {
  const dim = DIMS[currentStep];
  $('step-icon').textContent    = dim.icon;
  $('step-counter').textContent = `Dimensión ${getStepLabel(currentStep)}`;
  $('step-title').textContent   = dim.title;
  $('btn-back').textContent     = currentStep === 0 ? CONFIG.btnBack0 : CONFIG.btnBackN;

  setProgress(currentStep);

  const isNA = selections[currentStep] === 'na';
  const grid = $('levels-grid');
  grid.innerHTML = '';
  dim.levels.forEach((lvl, idx) => {
    const cls      = LEVEL_CLS[idx];
    const selected = selections[currentStep] === idx;
    const card     = document.createElement('div');
    card.className = `level-card${selected ? ' sel-' + cls : ''}${isNA ? ' na-dimmed' : ''}`;
    card.setAttribute('role', 'radio');
    card.setAttribute('aria-checked', selected ? 'true' : 'false');
    card.setAttribute('tabindex', '0');
    card.innerHTML = `
      <div class="check-circle">✓</div>
      <div class="lvl-card-left">
        <div class="lvl-badge ${cls}">N${idx+1} · ${lvl.name}</div>
        <div class="lvl-name">${lvl.name}</div>
      </div>
      <div class="lvl-card-right">
        <div class="lvl-desc">${lvl.detail || lvl.desc}</div>
        ${lvl.ejemplos && lvl.ejemplos.length ? `<ul class="lvl-examples">${lvl.ejemplos.map(e => `<li>${e}</li>`).join('')}</ul>` : ''}
      </div>
    `;
    card.addEventListener('click', () => selectLevel(idx));
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') selectLevel(idx); });
    grid.appendChild(card);
  });

  const naBtn = $('btn-na');
  naBtn.classList.toggle('active-na', isNA);

  const nb = $('btn-next');
  nb.disabled    = selections[currentStep] === null;
  nb.textContent = currentStep === DIMS.length - 1 ? CONFIG.btnFinish : CONFIG.btnNext;
}

function selectLevel(idx) { selections[currentStep] = idx; renderStep(); }

function selectNA() {
  selections[currentStep] = 'na';
  renderStep();
  goNext();
}

// ── Results ──────────────────────────────────────────────────────
function showResultsScreen() {
  $('progress-wrap').style.display = 'none';
  showScreen('results');
  renderResults();
}

function renderResults() {
  const scores    = selections.map(s => s === 'na' ? 0 : s + 1);
  const appScores = selections.filter(s => s !== 'na').map(s => s + 1);
  const avg       = appScores.length ? appScores.reduce((a, b) => a + b, 0) / appScores.length : 0;
  const naCount   = selections.filter(s => s === 'na').length;

  $('overall-score').textContent = avg.toFixed(1);
  $('stage-label').textContent   = getStageLabel(avg);
  if (naCount > 0) {
    const eyebrow = $('cfg-score-eyebrow');
    if (eyebrow) eyebrow.textContent = `Basado en ${appScores.length} de ${DIMS.length} dimensiones evaluadas`;
  }

  const container = $('dimension-results');
  container.innerHTML = '';
  DIMS.forEach((dim, i) => {
    const lvlIdx = selections[i];
    const card   = document.createElement('div');
    if (lvlIdx === 'na') {
      card.className = 'dim-result na-result';
      card.innerHTML = `
        <div class="dim-result-top">
          <div class="dim-result-name">${dim.icon} ${dim.title}</div>
          <span class="na-badge">No aplica</span>
        </div>
        <div class="mini-text" style="color:var(--gray-400);margin-top:6px;">Esta dimensión no aplica a tu organización y fue excluida del cálculo.</div>
      `;
    } else {
      const cls     = LEVEL_COLS[LEVEL_CLS[lvlIdx]];
      const hasNext = lvlIdx < 3;
      const todayDesc = dim.levels[lvlIdx].detail || dim.levels[lvlIdx].desc;
      const nextDesc  = hasNext
        ? `<strong>N${lvlIdx+2} · ${dim.levels[lvlIdx+1].name}:</strong> ${dim.levels[lvlIdx+1].detail || dim.levels[lvlIdx+1].desc}`
        : CONFIG.maxLevelMsg;
      card.className = 'dim-result';
      card.innerHTML = `
        <div class="dim-result-top">
          <div class="dim-result-name">${dim.icon} ${dim.title}</div>
          <div class="dim-score-chip" style="background:${cls.bg};color:${cls.text};">
            N${lvlIdx+1} · ${dim.levels[lvlIdx].name}
          </div>
        </div>
        <div class="mini-label">${CONFIG.todayLabel}</div>
        <div class="mini-text">${todayDesc}</div>
        <div class="mini-divider"></div>
        <div class="mini-label">${CONFIG.nextStepLabel}</div>
        <div class="mini-text">${nextDesc}</div>
      `;
    }
    container.appendChild(card);
  });

  if (radarChart) { radarChart.destroy(); }
  const ctx = $('radar-chart').getContext('2d');
  const lvlColors = ['rgba(179,72,38,0.85)','rgba(138,82,16,0.85)','rgba(53,96,16,0.85)','rgba(15,77,138,0.85)'];
  radarChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: DIMS.map(d => d.title),
      datasets: [{
        data: scores,
        backgroundColor: scores.map((s, i) => selections[i] === 'na' ? 'rgba(209,213,219,0.7)' : lvlColors[s - 1]),
        borderRadius: 5,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 700, easing: 'easeOutQuart' },
      scales: {
        x: {
          min: 0, max: 4,
          ticks: { stepSize: 1, font: { size: 11 }, color: '#9CA3AF', callback: v => v === 0 ? '' : `N${v}` },
          grid: { color: 'rgba(0,0,0,0.07)' },
        },
        y: {
          ticks: { font: { size: 11, weight: '700' }, color: '#374151' },
          grid: { display: false },
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

// ── Step label helper ─────────────────────────────────────────────
function getStepLabel(step) {
  const dim = DIMS[step];
  if (dim.id === 'campanas') return '3a de 6';
  if (dim.id === 'grants')   return '3b de 6';
  const n = step < 2 ? step + 1 : step;
  return `${n} de 6`;
}

// ── Chart helpers ─────────────────────────────────────────────────
function wrapLabel(title, maxChars) {
  if (title.length <= maxChars) return title;
  const words = title.split(' ');
  const half  = Math.ceil(words.length / 2);
  return [words.slice(0, half).join(' '), words.slice(half).join(' ')];
}

function getHighResChartImage() {
  return new Promise(resolve => {
    const off  = document.createElement('canvas');
    off.width  = 900; off.height = 420;
    const scores = selections.map(s => s === 'na' ? 0 : s + 1);
    const lvlColors = ['rgba(179,72,38,0.85)','rgba(138,82,16,0.85)','rgba(53,96,16,0.85)','rgba(15,77,138,0.85)'];
    const tmp = new Chart(off.getContext('2d'), {
      type: 'bar',
      data: {
        labels: DIMS.map((d, i) => selections[i] === 'na' ? d.title + ' (N/A)' : d.title),
        datasets: [{
          data: scores,
          backgroundColor: scores.map((s, i) => selections[i] === 'na' ? 'rgba(209,213,219,0.7)' : lvlColors[s - 1]),
          borderRadius: 8,
          borderSkipped: false,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: false, animation: false,
        maintainAspectRatio: false,
        scales: {
          x: {
            min: 0, max: 4,
            ticks: { stepSize: 1, font: { size: 18 }, color: '#9CA3AF', callback: v => v === 0 ? '' : `N${v}` },
            grid: { color: 'rgba(0,0,0,0.07)' },
          },
          y: {
            ticks: { font: { size: 18, weight: '700' }, color: '#374151' },
            grid: { display: false },
          }
        },
        plugins: { legend: { display: false } }
      }
    });
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const dataURL = off.toDataURL('image/png', 1.0);
      tmp.destroy();
      resolve(dataURL);
    }));
  });
}

// ── PDF programático ──────────────────────────────────────────────
async function buildPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const PW = 210, PH = 297, ML = 14, MR = 14, MB = 14;
  const USW = PW - ML - MR, BLIMIT = PH - MB;

  const C = {
    primary: [24,95,165], primaryDark: [15,61,110], primaryLight: [234,243,252],
    white: [255,255,255], g900: [17,24,39], g700: [55,65,81],
    g500: [107,114,128], g400: [156,163,175], g200: [229,231,235],
    g100: [243,244,246], g50: [249,250,251],
  };
  const LVL = [
    { t:[179,72,38], b:[254,240,235] }, { t:[138,82,16], b:[254,247,236] },
    { t:[53,96,16],  b:[240,248,230] }, { t:[15,77,138], b:[234,243,252] },
  ];

  const scores     = selections.map(s => s === 'na' ? 0 : s + 1);
  const appScores  = selections.filter(s => s !== 'na').map(s => s + 1);
  const avg        = appScores.length ? appScores.reduce((a, b) => a + b, 0) / appScores.length : 0;
  const chartImg   = await getHighResChartImage();
  const displayOrg = orgName || 'Mi organizacion';
  const dateStr    = new Date().toLocaleDateString('es-MX', { year:'numeric', month:'long', day:'numeric' });

  let y = 0;
  let pageNum = 1;

  const fill   = (...rgb) => doc.setFillColor(...rgb);
  const stroke = (...rgb) => doc.setDrawColor(...rgb);
  const color  = (...rgb) => doc.setTextColor(...rgb);
  const bold   = sz => { doc.setFont('helvetica','bold');       doc.setFontSize(sz); };
  const normal = sz => { doc.setFont('helvetica','normal');     doc.setFontSize(sz); };
  const bital  = sz => { doc.setFont('helvetica','bolditalic'); doc.setFontSize(sz); };

  // ── Cover banner (full bleed) ─────────────────────────────────
  const BANNER_H = 50;
  fill(...C.primaryDark);
  doc.rect(0, 0, PW, BANNER_H, 'F');
  fill(20, 82, 155);
  doc.rect(0, BANNER_H - 5, PW, 5, 'F');

  bold(6.5); color(160, 200, 240);
  doc.text(
    `${CONFIG.brand.toUpperCase()}  ·  ${CONFIG.workshop.toUpperCase()}`,
    PW / 2, 13, { align: 'center' }
  );
  bold(17); color(...C.white);
  doc.text(CONFIG.pdfTitle, PW / 2, 26, { align: 'center' });
  normal(10); color(195, 220, 248);
  doc.text(displayOrg, PW / 2, 38, { align: 'center' });

  y = BANNER_H + 12;

  // ── Running header for pages 2+ ───────────────────────────────
  function drawRunningHeader() {
    bold(7.5); color(...C.primary);
    doc.text(displayOrg, ML, 9);
    normal(7); color(...C.g400);
    doc.text(`${CONFIG.brand}  ·  ${CONFIG.workshop}`, PW - MR, 9, { align: 'right' });
    stroke(...C.g200); doc.setLineWidth(0.25);
    doc.line(ML, 12, PW - MR, 12);
  }

  // ── Page footer ───────────────────────────────────────────────
  function drawFooter(pgNum) {
    stroke(...C.g200); doc.setLineWidth(0.2);
    doc.line(ML, PH - 10, PW - MR, PH - 10);
    normal(7); color(...C.g400);
    doc.text(`${CONFIG.brand}  ·  v2afoundation.org  ·  ${dateStr}`, ML, PH - 6);
    doc.text(`${pgNum}`, PW - MR, PH - 6, { align: 'right' });
  }

  function newPage() {
    drawFooter(pageNum);
    doc.addPage();
    pageNum++;
    y = 18;
    drawRunningHeader();
  }

  function ensure(h) { if (y + h > BLIMIT) newPage(); }

  // ── Score summary card ────────────────────────────────────────
  const avgLvlIdx = Math.min(3, Math.max(0, Math.round(avg) - 1));
  const avgLvlC   = LVL[avgLvlIdx];
  const scoreH    = 36;

  fill(...C.g50); stroke(...C.g200); doc.setLineWidth(0.3);
  doc.roundedRect(ML, y, USW, scoreH, 4, 4, 'FD');
  fill(...avgLvlC.t);
  doc.roundedRect(ML, y, 5, scoreH, 2, 2, 'F');
  doc.rect(ML + 3, y, 2, scoreH, 'F');

  bold(6); color(...C.g400);
  doc.text('PUNTUACION GENERAL', ML + 11, y + 9);
  bold(26); color(...C.primaryDark);
  doc.text(avg.toFixed(1), ML + 11, y + 24);
  const scoreW = doc.getTextWidth(avg.toFixed(1));
  normal(11); color(...C.g500);
  doc.text('/ 4.0', ML + 11 + scoreW + 2, y + 24);

  const stageStr = getStageLabel(avg);
  bold(9); color(...avgLvlC.t);
  const stageW = doc.getTextWidth(stageStr) + 14;
  const stageX = ML + USW - stageW - 2;
  fill(...avgLvlC.b);
  doc.roundedRect(stageX, y + scoreH / 2 - 5.5, stageW, 11, 3, 3, 'F');
  doc.text(stageStr, stageX + stageW / 2, y + scoreH / 2 + 1.8, { align: 'center' });

  y += scoreH + 14;

  // ── Chart section ─────────────────────────────────────────────
  ensure(60);
  bold(10.5); color(...C.g900);
  doc.text('Perfil de Madurez por Dimension', ML, y);
  fill(...C.primary);
  doc.rect(ML, y + 3, 46, 1.5, 'F');
  y += 9;

  const chartH = Math.round(USW * 420 / 900);
  doc.addImage(chartImg, 'PNG', ML, y, USW, chartH);
  y += chartH + 14;

  // ── Dimension detail section ──────────────────────────────────
  ensure(20);
  bold(10.5); color(...C.g900);
  doc.text('Detalle por dimension', ML, y);
  fill(...C.primary);
  doc.rect(ML, y + 3, 38, 1.5, 'F');
  y += 12;

  const LH = 4.4;

  DIMS.forEach((dim, i) => {
    const lvlIdx = selections[i];
    const score  = scores[i];

    // ── No aplica card ──────────────────────────────────────────
    if (lvlIdx === 'na') {
      const naCardH = 18;
      ensure(naCardH + 3);
      fill(...C.g100); stroke(...C.g200); doc.setLineWidth(0.2);
      doc.roundedRect(ML, y, USW, naCardH, 3, 3, 'FD');
      fill(...C.g400);
      doc.roundedRect(ML, y, 4, naCardH, 2, 2, 'F');
      doc.rect(ML + 2, y, 2, naCardH, 'F');
      bold(9.5); color(...C.g500);
      doc.text(dim.title, ML + 9, y + 7);
      normal(8); color(...C.g400);
      doc.text('No aplica — excluida del calculo de madurez', ML + 9, y + 13);
      y += naCardH + 4;
      return;
    }

    // ── Regular dimension card ──────────────────────────────────
    const lc       = LVL[lvlIdx];
    const lvlName  = dim.levels[lvlIdx].name;
    const hasNext  = lvlIdx < 3;
    const todayTxt = dim.levels[lvlIdx].detail || dim.levels[lvlIdx].desc;
    const nextTxt  = hasNext
      ? `N${lvlIdx + 2} - ${dim.levels[lvlIdx + 1].name}: ${dim.levels[lvlIdx + 1].detail || dim.levels[lvlIdx + 1].desc}`
      : CONFIG.pdfMaxLevel;

    normal(9);
    const todayLines = doc.splitTextToSize(todayTxt, USW - 22);
    const nextLines  = doc.splitTextToSize(nextTxt,  USW - 22);
    const cardH = 8 + 5 + 5 + todayLines.length * LH + 4 + 4 + nextLines.length * LH + 7;

    ensure(cardH + 3);

    // Card background
    fill(...C.g50); stroke(...C.g200); doc.setLineWidth(0.2);
    doc.roundedRect(ML, y, USW, cardH, 3, 3, 'FD');

    // Left accent bar
    fill(...lc.t);
    doc.roundedRect(ML, y, 4, cardH, 2, 2, 'F');
    doc.rect(ML + 2, y, 2, cardH, 'F');

    let cy = y + 8;

    // Title
    bold(9.5); color(...C.g900);
    doc.text(dim.title, ML + 9, cy);

    // Level chip
    const chipTxt = `N${score} - ${lvlName}`;
    bold(7);
    const chipW = doc.getTextWidth(chipTxt) + 9;
    const chipX = PW - MR - chipW;
    fill(...lc.b); stroke(...lc.t); doc.setLineWidth(0.4);
    doc.roundedRect(chipX, y + 2.5, chipW, 7.5, 2, 2, 'FD');
    color(...lc.t);
    doc.text(chipTxt, chipX + chipW / 2, y + 7.5, { align: 'center' });
    cy += 5;

    // Mini 4-segment progress bar
    const segTotalW = 52, segGap = 1.5, segH = 3.5;
    const segW = (segTotalW - segGap * 3) / 4;
    for (let s = 0; s < 4; s++) {
      fill(...(s < score ? lc.t : C.g200));
      doc.roundedRect(ML + 9 + s * (segW + segGap), cy, segW, segH, 1, 1, 'F');
    }
    cy += segH + 5;

    // Today
    bold(6); color(...C.g400);
    doc.text('DONDE ESTAS HOY', ML + 9, cy);
    cy += 4;
    normal(8.5); color(...C.g700);
    todayLines.forEach(l => { doc.text(l, ML + 9, cy); cy += LH; });

    cy += 2;
    stroke(...C.g200); doc.setLineWidth(0.15);
    doc.line(ML + 9, cy, PW - MR - 4, cy);
    cy += 4;

    // Next step
    bold(6); color(...C.g400);
    doc.text('PROXIMO PASO', ML + 9, cy);
    cy += 4;
    normal(8.5); color(...C.g700);
    nextLines.forEach(l => { doc.text(l, ML + 9, cy); cy += LH; });

    y = cy + 7;
  });


  // ── Footer on last page ───────────────────────────────────────
  drawFooter(pageNum);

  return doc;
}

async function downloadPDF() {
  const btn = $('btn-pdf');
  btn.disabled = true;
  showLoading('Generando PDF…');
  try {
    const doc = await buildPDF();
    doc.save('diagnostico-madurez-v2a.pdf');
    showToast('✅ PDF descargado correctamente');
  } catch (err) {
    console.error(err);
    showToast('❌ Error al generar el PDF. Intenta de nuevo.');
  } finally {
    hideLoading();
    btn.disabled = false;
  }
}

// ── Email ─────────────────────────────────────────────────────────
async function sendEmail() {
  const emailInput = $('email-input');
  const email = (emailInput.value || '').trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showToast('⚠️ Ingresa un correo electrónico válido'); return;
  }
  const btn = $('btn-email');
  btn.disabled = true;
  showLoading('Preparando resultados…');
  try {
    const scores    = selections.map(s => s === 'na' ? 0 : s + 1);
    const appScores = selections.filter(s => s !== 'na').map(s => s + 1);
    const avg       = appScores.length ? appScores.reduce((a, b) => a + b, 0) / appScores.length : 0;

    const doc       = await buildPDF();
    const pdfBase64 = doc.output('datauristring').split(',')[1];

    const displayOrg = orgName || 'Mi organización';
    const stageLabel = getStageLabel(avg);
    const naCount    = selections.filter(s => s === 'na').length;

    const dimRows = DIMS.map((d, i) => {
      const sel = selections[i];
      if (sel === 'na') {
        return `<tr>
          <td style="padding:10px 14px;border-bottom:1px solid #E5E7EB;font-size:14px;color:#374151;">${d.icon} ${d.title}</td>
          <td style="padding:10px 14px;border-bottom:1px solid #E5E7EB;text-align:center;">
            <span style="background:#F3F4F6;color:#9CA3AF;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;">No aplica</span>
          </td>
          <td style="padding:10px 14px;border-bottom:1px solid #E5E7EB;font-size:13px;color:#9CA3AF;">—</td>
        </tr>`;
      }
      const lvl   = d.levels[sel];
      const cls   = LEVEL_CLS[sel];
      const cols  = LEVEL_COLS[cls];
      return `<tr>
        <td style="padding:10px 14px;border-bottom:1px solid #E5E7EB;font-size:14px;color:#374151;">${d.icon} ${d.title}</td>
        <td style="padding:10px 14px;border-bottom:1px solid #E5E7EB;text-align:center;">
          <span style="background:${cols.bg};color:${cols.text};border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;">N${sel+1} · ${lvl.name}</span>
        </td>
        <td style="padding:10px 14px;border-bottom:1px solid #E5E7EB;font-size:13px;color:#6B7280;">${lvl.detail || lvl.desc}</td>
      </tr>`;
    }).join('');

    const naNote = naCount > 0
      ? `<p style="font-size:13px;color:#9CA3AF;margin:0 0 20px;text-align:center;">* Puntuación basada en ${DIMS.length - naCount} de ${DIMS.length} dimensiones evaluadas</p>`
      : '';

    const preheader = `${displayOrg} obtuvo ${avg.toFixed(1)}/4.0 · ${stageLabel}. Tu reporte completo viene adjunto.`;
    const emailHtml = `<!DOCTYPE html><html><body style="margin:0;padding:0;background:#F9FAFB;font-family:sans-serif;">
<span style="display:none;font-size:1px;color:#F9FAFB;max-height:0;overflow:hidden;opacity:0;">${preheader}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;</span>
<table width="100%" cellpadding="0" cellspacing="0" style="background:#F9FAFB;padding:32px 16px;">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
  <!-- Header -->
  <tr><td style="background:#18407A;border-radius:12px 12px 0 0;padding:28px 32px;text-align:center;">
    <p style="margin:0 0 4px;font-size:11px;font-weight:700;color:#A0C8F0;letter-spacing:0.1em;text-transform:uppercase;">${CONFIG.brand.toUpperCase()} · ${CONFIG.workshop.toUpperCase()}</p>
    <h1 style="margin:0;font-size:22px;font-weight:800;color:#fff;">${CONFIG.pdfTitle}</h1>
  </td></tr>
  <!-- Score hero -->
  <tr><td style="background:#fff;padding:28px 32px 20px;text-align:center;">
    <p style="margin:0 0 6px;font-size:13px;color:#6B7280;">Resultado para <strong style="color:#111827;">${displayOrg}</strong></p>
    <div style="display:inline-block;background:#EAF3FC;border-radius:16px;padding:20px 40px;margin:8px 0;">
      <span style="font-size:52px;font-weight:800;color:#18407A;line-height:1;">${avg.toFixed(1)}</span>
      <span style="font-size:20px;color:#9CA3AF;font-weight:400;"> / 4.0</span>
      <p style="margin:8px 0 0;font-size:16px;font-weight:700;color:#185FAB;">${stageLabel}</p>
    </div>
    ${naNote}
  </td></tr>
  <!-- Dimensions table -->
  <tr><td style="background:#fff;padding:0 32px 28px;">
    <p style="margin:0 0 12px;font-size:14px;font-weight:700;color:#111827;">Detalle por dimensión</p>
    <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #E5E7EB;border-radius:8px;overflow:hidden;">
      <tr style="background:#F9FAFB;">
        <th style="padding:10px 14px;text-align:left;font-size:12px;color:#6B7280;font-weight:600;border-bottom:1px solid #E5E7EB;">Dimensión</th>
        <th style="padding:10px 14px;text-align:center;font-size:12px;color:#6B7280;font-weight:600;border-bottom:1px solid #E5E7EB;">Nivel</th>
        <th style="padding:10px 14px;text-align:left;font-size:12px;color:#6B7280;font-weight:600;border-bottom:1px solid #E5E7EB;">Descripción</th>
      </tr>
      ${dimRows}
    </table>
  </td></tr>
  <!-- Footer -->
  <tr><td style="background:#F3F4F6;border-radius:0 0 12px 12px;padding:16px 32px;text-align:center;">
    <p style="margin:0;font-size:12px;color:#9CA3AF;">${CONFIG.brand} · <a href="https://v2afoundation.org" style="color:#9CA3AF;">v2afoundation.org</a></p>
    <p style="margin:4px 0 0;font-size:11px;color:#D1D5DB;">El reporte completo en PDF viene adjunto a este correo.</p>
  </td></tr>
</table>
</td></tr>
</table>
</body></html>`;

    const payload = {
      email:     email,
      orgName:   displayOrg,
      score:     avg.toFixed(1),
      stage:     stageLabel,
      htmlBody:  emailHtml,
      dimensions: DIMS.map((d, i) => {
        const sel = selections[i];
        if (sel === 'na') return { title: d.title, level: 'No aplica', detail: '' };
        const lvl = d.levels[sel];
        return { title: d.title, level: lvl.name, detail: lvl.detail || lvl.desc };
      }),
      q1:        ($('q1-input').value || '').trim(),
      q2:        ($('q2-input').value || '').trim(),
      pdfBase64: pdfBase64,
    };
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    });
    $('form-block').style.display = 'none';
    $('thank-you-block').style.display = 'block';
    $('cfg-restart-btn').style.display = 'none';
  } catch (err) {
    console.error(err);
    showToast('❌ No se pudo guardar. Intenta de nuevo.', 4000);
  } finally {
    hideLoading();
    btn.disabled = false;
  }
}

// ── Teclado ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!$('screen-assessment').classList.contains('active')) return;
  if (e.key >= '1' && e.key <= '4') selectLevel(parseInt(e.key) - 1);
  if (e.key === 'Enter' && selections[currentStep] !== null) goNext();
  if (e.key === 'ArrowLeft') goBack();
});

// ── Init ──────────────────────────────────────────────────────────
applyConfig();
</script>
