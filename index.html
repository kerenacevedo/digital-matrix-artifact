<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F3D6E" />
  <title>Diagnóstico de Madurez Digital y AI — Fundación V2A</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #185FA5;
      --primary-dark:  #0F3D6E;
      --primary-light: #EAF3FC;
      --n1-text: #B34826; --n1-bg: #FEF0EB;
      --n2-text: #8A5210; --n2-bg: #FEF7EC;
      --n3-text: #356010; --n3-bg: #F0F8E6;
      --n4-text: #0F4D8A; --n4-bg: #EAF3FC;
      --gray-50:  #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
      --gray-400: #9CA3AF; --gray-500: #6B7280; --gray-700: #374151; --gray-900: #111827;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px; line-height: 1.55; color: var(--gray-900);
      background: var(--gray-50); min-height: 100vh; -webkit-text-size-adjust: 100%;
    }

    /* ── Header ── */
    .app-header {
      background: var(--primary-dark); color: #fff;
      padding: 20px 20px 14px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .header-inner { text-align: center; }
    .header-logo { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.72; margin-bottom: 3px; }
    .header-title { font-size: 17px; font-weight: 700; line-height: 1.25; }
    @media (min-width: 480px) { .header-title { font-size: 19px; } }

    /* Progress */
    .progress-wrap { margin-top: 10px; padding-bottom: 12px; display: none; }
    .progress-track { background: rgba(255,255,255,0.25); height: 5px; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #fff; border-radius: 3px; transition: width 0.4s cubic-bezier(.4,0,.2,1); width: 0%; }
    .progress-text { font-size: 11px; opacity: 0.68; margin-top: 5px; text-align: right; }

    /* ── Layout ── */
    .main { max-width: 620px; margin: 0 auto; padding: 24px 16px 56px; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Welcome ── */
    .welcome-card { background: #fff; border-radius: 20px; padding: 32px 24px 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); text-align: center; }
    .welcome-emoji { font-size: 52px; margin-bottom: 14px; line-height: 1; }
    .welcome-card h2 { font-size: 21px; font-weight: 800; color: var(--primary); line-height: 1.3; margin-bottom: 12px; }
    .welcome-card > p { font-size: 15px; color: var(--gray-700); margin-bottom: 18px; }
    .dim-list { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 12px; padding: 14px 18px; margin: 0 0 20px; text-align: left; }
    .dim-list li { list-style: none; padding: 5px 0; font-size: 15px; color: var(--gray-700); display: flex; align-items: center; gap: 10px; }
    .dim-list li::before { content: '→'; color: var(--primary); font-weight: 700; flex-shrink: 0; }
    .welcome-meta { font-size: 13px; color: var(--gray-400); margin-bottom: 18px; }
    .org-input-wrap { margin-bottom: 18px; text-align: left; }
    .org-input-label { font-size: 13px; font-weight: 700; color: var(--gray-700); margin-bottom: 6px; display: block; }
    .org-input { width: 100%; padding: 14px 16px; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 16px; outline: none; transition: border-color 0.18s; background: #fff; color: var(--gray-900); }
    .org-input:focus { border-color: var(--primary); }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 15px 28px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; transition: background 0.18s, transform 0.15s; min-height: 52px; width: 100%; text-decoration: none; -webkit-tap-highlight-color: transparent; user-select: none; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:not(:disabled):hover { background: var(--primary-dark); }
    .btn-primary:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; transform: none; }
    .btn-secondary { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
    .btn-secondary:not(:disabled):hover { background: var(--primary-light); }
    .btn-ghost { background: #fff; color: var(--gray-700); border: 2px solid var(--gray-200); width: auto; padding: 15px 20px; flex-shrink: 0; }

    /* ── Step ── */
    .step-header { margin-bottom: 18px; }
    .step-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--primary-light); color: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-bottom: 10px; }
    .step-header h2 { font-size: 22px; font-weight: 800; color: var(--gray-900); line-height: 1.25; margin-bottom: 4px; }
    .step-hint { font-size: 14px; color: var(--gray-500); }
    .levels-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 22px; }
    @media (min-width: 560px) { .levels-grid { grid-template-columns: 1fr 1fr; } }
    .lvl-examples { margin-top: 8px; padding-left: 14px; }
    .lvl-examples li { font-size: 13px; color: var(--gray-500); line-height: 1.5; margin-bottom: 3px; }
    .step-nav { display: flex; gap: 10px; align-items: stretch; }
    .step-nav .btn-primary { flex: 1; }

    /* ── Level cards ── */
    .level-card { background: #fff; border: 2.5px solid var(--gray-200); border-radius: 14px; padding: 15px 42px 15px 16px; cursor: pointer; transition: border-color 0.18s, box-shadow 0.18s, background 0.18s; position: relative; -webkit-tap-highlight-color: transparent; user-select: none; }
    .level-card:hover { border-color: var(--primary); box-shadow: 0 3px 12px rgba(24,95,165,0.12); }
    .level-card.sel-n1 { background: var(--n1-bg); border-color: var(--n1-text); }
    .level-card.sel-n2 { background: var(--n2-bg); border-color: var(--n2-text); }
    .level-card.sel-n3 { background: var(--n3-bg); border-color: var(--n3-text); }
    .level-card.sel-n4 { background: var(--n4-bg); border-color: var(--n4-text); }
    .check-circle { position: absolute; top: 14px; right: 14px; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; opacity: 0; transition: opacity 0.15s; }
    .level-card.sel-n1 .check-circle { background: var(--n1-text); opacity: 1; }
    .level-card.sel-n2 .check-circle { background: var(--n2-text); opacity: 1; }
    .level-card.sel-n3 .check-circle { background: var(--n3-text); opacity: 1; }
    .level-card.sel-n4 .check-circle { background: var(--n4-text); opacity: 1; }
    .lvl-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .lvl-badge.n1 { background: var(--n1-bg); color: var(--n1-text); }
    .lvl-badge.n2 { background: var(--n2-bg); color: var(--n2-text); }
    .lvl-badge.n3 { background: var(--n3-bg); color: var(--n3-text); }
    .lvl-badge.n4 { background: var(--n4-bg); color: var(--n4-text); }
    .lvl-name { font-size: 16px; font-weight: 700; color: var(--gray-900); margin-bottom: 4px; }
    .lvl-desc { font-size: 14px; color: var(--gray-700); line-height: 1.5; }

    /* ── Results ── */
    .score-hero { background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%); color: #fff; border-radius: 20px; padding: 28px 24px 24px; text-align: center; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(15,61,110,0.25); }
    .score-eyebrow { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.72; margin-bottom: 6px; }
    .score-number { font-size: 62px; font-weight: 900; line-height: 1; }
    .score-denom  { font-size: 22px; font-weight: 600; opacity: 0.65; }
    .score-stage { display: inline-block; background: rgba(255,255,255,0.2); font-size: 18px; font-weight: 800; padding: 7px 20px; border-radius: 24px; margin-top: 10px; }
    .score-brand { font-size: 12px; opacity: 0.55; margin-top: 10px; }
    .chart-card { background: #fff; border-radius: 16px; padding: 20px 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 15px; font-weight: 700; color: var(--gray-900); margin-bottom: 14px; text-align: center; }
    .chart-inner { position: relative; width: 100%; margin: 0 auto; height: 300px; }
    .section-heading { font-size: 17px; font-weight: 800; color: var(--gray-900); margin-bottom: 12px; }
    .dim-result { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
    .dim-result-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .dim-result-name { font-size: 15px; font-weight: 700; color: var(--gray-900); line-height: 1.3; }
    .dim-score-chip { flex-shrink: 0; padding: 4px 11px; border-radius: 20px; font-size: 12px; font-weight: 800; white-space: nowrap; }
    .mini-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gray-400); margin-bottom: 3px; }
    .mini-text { font-size: 14px; color: var(--gray-700); line-height: 1.5; }
    .mini-divider { height: 1px; background: var(--gray-100); margin: 10px 0; }
    .callout-block { background: var(--primary-light); border-left: 4px solid var(--primary); border-radius: 0 12px 12px 0; padding: 16px 18px; margin: 20px 0 4px; }
    .callout-block p { font-size: 15px; font-style: italic; color: var(--primary-dark); line-height: 1.55; font-weight: 600; }

    /* ── Actions ── */
    .actions-section { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--gray-200); }
    .actions-heading { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--gray-900); }
    .email-row { display: flex; flex-direction: column; gap: 10px; }
    .email-row input { padding: 15px 16px; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 16px; outline: none; transition: border-color 0.18s; width: 100%; background: #fff; }
    .email-row input:focus { border-color: var(--primary); }
    .question-block { margin-bottom: 18px; }
    .question-label { font-size: 14px; font-weight: 700; color: var(--gray-700); margin-bottom: 8px; display: block; line-height: 1.4; }
    .question-textarea { width: 100%; padding: 14px 16px; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 15px; font-family: inherit; outline: none; resize: vertical; min-height: 90px; transition: border-color 0.18s; background: #fff; color: var(--gray-900); }
    .question-textarea:focus { border-color: var(--primary); }
    .email-section-label { font-size: 13px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; display: block; }
    .branding-footer { text-align: center; margin-top: 28px; padding: 16px; color: var(--gray-400); font-size: 13px; line-height: 1.7; }

    /* ── Toast & Loading ── */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(8px); background: #1a1a2e; color: #fff; padding: 13px 24px; border-radius: 14px; font-size: 15px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.28s ease, transform 0.28s ease; max-width: 88vw; text-align: center; pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(15,61,110,0.55); z-index: 500; align-items: center; justify-content: center; flex-direction: column; gap: 16px; color: #fff; font-size: 16px; font-weight: 700; }
    .loading-overlay.show { display: flex; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-logo" id="cfg-header-logo"></div>
    <h1 class="header-title">Diagnóstico de Madurez Digital y AI</h1>
  </div>
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text"></div>
  </div>
</header>

<main class="main">

  <!-- WELCOME -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome-card">
      <div class="welcome-emoji" id="cfg-welcome-emoji"></div>
      <h2 id="cfg-welcome-title"></h2>
      <p id="cfg-welcome-subtitle"></p>
      <ul class="dim-list" id="cfg-dim-list"></ul>
      <p class="welcome-meta" id="cfg-welcome-meta"></p>
      <div class="org-input-wrap">
        <label class="org-input-label" id="cfg-org-label" for="org-name-input"></label>
        <input type="text" id="org-name-input" class="org-input" maxlength="60" autocomplete="organization" />
      </div>
      <button class="btn btn-primary" id="cfg-start-btn" onclick="startAssessment()"></button>
    </div>
  </div>

  <!-- ASSESSMENT -->
  <div id="screen-assessment" class="screen">
    <div class="step-header">
      <div class="step-pill">
        <span id="step-icon">📋</span>
        <span id="step-counter"></span>
      </div>
      <h2 id="step-title"></h2>
      <p class="step-hint" id="cfg-step-hint"></p>
    </div>
    <div class="levels-grid" id="levels-grid"></div>
    <div class="step-nav">
      <button class="btn btn-ghost" id="btn-back" onclick="goBack()"></button>
      <button class="btn btn-primary" id="btn-next" onclick="goNext()" disabled></button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="screen">
    <div id="results-section">
      <div class="score-hero">
        <div class="score-eyebrow" id="cfg-score-eyebrow"></div>
        <div>
          <span class="score-number" id="overall-score">0.0</span>
          <span class="score-denom"> / 4.0</span>
        </div>
        <div class="score-stage" id="stage-label">—</div>
      </div>
      <div class="chart-card">
        <div class="card-title" id="cfg-chart-title"></div>
        <div class="chart-inner"><canvas id="radar-chart"></canvas></div>
      </div>
      <div class="section-heading" id="cfg-dim-heading"></div>
      <div id="dimension-results"></div>
      <div class="callout-block"><p id="cfg-quote"></p></div>
    </div>

    <div class="actions-section">
      <div class="actions-heading" id="cfg-actions-heading"></div>
      <div class="question-block">
        <label class="question-label" for="q1-input">1. ¿Qué tarea te consume más tiempo?</label>
        <textarea id="q1-input" class="question-textarea" rows="3"></textarea>
      </div>
      <div class="question-block">
        <label class="question-label" for="q2-input">2. Si tuvieras una varita mágica para eliminar una tarea de tu día a día, ¿cuál sería?</label>
        <textarea id="q2-input" class="question-textarea" rows="3"></textarea>
      </div>
      <span class="email-section-label">Recibe tus resultados por correo</span>
      <div class="email-row">
        <input type="email" id="email-input" autocomplete="email" />
        <button class="btn btn-secondary" id="btn-email" onclick="sendEmail()"></button>
      </div>
      <button class="btn btn-ghost" id="cfg-restart-btn" onclick="restartAssessment()" style="width:100%;margin-top:14px;"></button>
    </div>
    <div class="branding-footer" id="cfg-branding"></div>
  </div>

</main>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">Generando PDF…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// ════════════════════════════════════════════════════════════════
//  ✏️  CONFIGURACIÓN — edita aquí todos los textos de la app
// ════════════════════════════════════════════════════════════════

  // ════════════════════════════════════════════════════════════

const DIMS = CONFIG.dimensions;

const LEVEL_CLS  = ['n1','n2','n3','n4'];

  n1: { text: '#B34826', bg: '#FEF0EB' },

// ── Estado ───────────────────────────────────────────────────────
let currentStep = 0;
let selections  = new Array(DIMS.length).fill(null);
let radarChart  = null;

// ── Helpers ──────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $('screen-' + id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setProgress(step) {
  $('progress-fill').style.width = (step / DIMS.length * 100) + '%';
  $('progress-text').textContent = `${step} de ${DIMS.length} completadas`;
}

function showToast(msg, ms = 3200) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function showLoading(msg = 'Generando PDF…') { $('loading-text').textContent = msg; $('loading-overlay').classList.add('show'); }
function hideLoading() { $('loading-overlay').classList.remove('show'); }

function getStageLabel(avg) {
  for (const s of CONFIG.stages) { if (avg < s.max) return s.label; }
  return CONFIG.stages[CONFIG.stages.length - 1].label;
}

// ── Navegación ───────────────────────────────────────────────────
function startAssessment() {
  orgName     = ($('org-name-input').value || '').trim();
  currentStep = 0;
  selections  = new Array(DIMS.length).fill(null);
  $('progress-wrap').style.display = 'block';
  showScreen('assessment');
  renderStep();
}

function goBack() {
  if (currentStep === 0) {
    $('progress-wrap').style.display = 'none';
    showScreen('welcome');
  } else {
    currentStep--;
    renderStep();
  }
}

function goNext() {
  if (selections[currentStep] === null) return;
  if (currentStep < DIMS.length - 1) { currentStep++; renderStep(); }
  else showResultsScreen();
}

function restartAssessment() {
  if (radarChart) { radarChart.destroy(); radarChart = null; }
  currentStep = 0;
  selections  = new Array(DIMS.length).fill(null);
  $('progress-wrap').style.display = 'none';
  showScreen('welcome');
}

// ── Render step ──────────────────────────────────────────────────
function renderStep() {
  const dim = DIMS[currentStep];
  $('step-icon').textContent    = dim.icon;
  $('step-counter').textContent = `Dimensión ${getStepLabel(currentStep)}`;
  $('step-title').textContent   = dim.title;
  $('btn-back').textContent     = currentStep === 0 ? CONFIG.btnBack0 : CONFIG.btnBackN;

  setProgress(currentStep);

  const grid = $('levels-grid');
  grid.innerHTML = '';
  dim.levels.forEach((lvl, idx) => {
    const cls      = LEVEL_CLS[idx];
    const selected = selections[currentStep] === idx;
    const card     = document.createElement('div');
    card.className = `level-card${selected ? ' sel-' + cls : ''}`;
    card.setAttribute('role', 'radio');
    card.setAttribute('aria-checked', selected ? 'true' : 'false');
    card.setAttribute('tabindex', '0');
    card.innerHTML = `
      <div class="check-circle">✓</div>
      <div class="lvl-badge ${cls}">N${idx+1} · ${lvl.name}</div>
      <div class="lvl-name">${lvl.name}</div>
      <div class="lvl-desc">${lvl.detail || lvl.desc}</div>
      ${lvl.ejemplos && lvl.ejemplos.length ? `<ul class="lvl-examples">${lvl.ejemplos.map(e => `<li>${e}</li>`).join('')}</ul>` : ''}
    `;
    card.addEventListener('click', () => selectLevel(idx));
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') selectLevel(idx); });
    grid.appendChild(card);
  });

  const nb = $('btn-next');
  nb.disabled    = selections[currentStep] === null;
  nb.textContent = currentStep === DIMS.length - 1 ? CONFIG.btnFinish : CONFIG.btnNext;
}

function selectLevel(idx) { selections[currentStep] = idx; renderStep(); }

// ── Results ──────────────────────────────────────────────────────
function showResultsScreen() {
  $('progress-wrap').style.display = 'none';
  showScreen('results');
  renderResults();
}

function renderResults() {
  const scores = selections.map(s => s + 1);
  const avg    = scores.reduce((a, b) => a + b, 0) / scores.length;

  $('overall-score').textContent = avg.toFixed(1);
  $('stage-label').textContent   = getStageLabel(avg);

  const container = $('dimension-results');
  container.innerHTML = '';
  DIMS.forEach((dim, i) => {
    const lvlIdx  = selections[i];
    const cls     = LEVEL_CLS[lvlIdx];
    const cols    = LEVEL_COLS[cls];
    const hasNext = lvlIdx < 3;
    const todayDesc = dim.levels[lvlIdx].detail || dim.levels[lvlIdx].desc;
    const nextDesc  = hasNext
      ? `<strong>N${lvlIdx+2} · ${dim.levels[lvlIdx+1].name}:</strong> ${dim.levels[lvlIdx+1].detail || dim.levels[lvlIdx+1].desc}`
      : CONFIG.maxLevelMsg;

    const card = document.createElement('div');
    card.className = 'dim-result';
    card.innerHTML = `
      <div class="dim-result-top">
        <div class="dim-result-name">${dim.icon} ${dim.title}</div>
        <div class="dim-score-chip" style="background:${cols.bg};color:${cols.text};">
          N${lvlIdx+1} · ${dim.levels[lvlIdx].name}
        </div>
      </div>
      <div class="mini-label">${CONFIG.todayLabel}</div>
      <div class="mini-text">${todayDesc}</div>
      <div class="mini-divider"></div>
      <div class="mini-label">${CONFIG.nextStepLabel}</div>
      <div class="mini-text">${nextDesc}</div>
    `;
    container.appendChild(card);
  });

  if (radarChart) { radarChart.destroy(); }
  const ctx = $('radar-chart').getContext('2d');
  const lvlColors = ['rgba(179,72,38,0.85)','rgba(138,82,16,0.85)','rgba(53,96,16,0.85)','rgba(15,77,138,0.85)'];
  radarChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: DIMS.map(d => d.title),
      datasets: [{
        data: scores,
        backgroundColor: scores.map(s => lvlColors[s - 1]),
        borderRadius: 5,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 700, easing: 'easeOutQuart' },
      scales: {
        x: {
          min: 0, max: 4,
          ticks: { stepSize: 1, font: { size: 11 }, color: '#9CA3AF', callback: v => v === 0 ? '' : `N${v}` },
          grid: { color: 'rgba(0,0,0,0.07)' },
        },
        y: {
          ticks: { font: { size: 11, weight: '700' }, color: '#374151' },
          grid: { display: false },
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

// ── Step label helper ─────────────────────────────────────────────
function getStepLabel(step) {
  const dim = DIMS[step];
  if (dim.id === 'campanas') return '3a de 6';
  if (dim.id === 'grants')   return '3b de 6';
  const n = step < 2 ? step + 1 : step;
  return `${n} de 6`;
}

// ── Chart helpers ─────────────────────────────────────────────────
function wrapLabel(title, maxChars) {
  if (title.length <= maxChars) return title;
  const words = title.split(' ');
  const half  = Math.ceil(words.length / 2);
  return [words.slice(0, half).join(' '), words.slice(half).join(' ')];
}

function getHighResChartImage() {
  return new Promise(resolve => {
    const off  = document.createElement('canvas');
    off.width  = 900; off.height = 420;
    const scores = selections.map(s => s + 1);
    const lvlColors = ['rgba(179,72,38,0.85)','rgba(138,82,16,0.85)','rgba(53,96,16,0.85)','rgba(15,77,138,0.85)'];
    const tmp = new Chart(off.getContext('2d'), {
      type: 'bar',
      data: {
        labels: DIMS.map(d => d.title),
        datasets: [{
          data: scores,
          backgroundColor: scores.map(s => lvlColors[s - 1]),
          borderRadius: 8,
          borderSkipped: false,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: false, animation: false,
        maintainAspectRatio: false,
        scales: {
          x: {
            min: 0, max: 4,
            ticks: { stepSize: 1, font: { size: 18 }, color: '#9CA3AF', callback: v => v === 0 ? '' : `N${v}` },
            grid: { color: 'rgba(0,0,0,0.07)' },
          },
          y: {
            ticks: { font: { size: 18, weight: '700' }, color: '#374151' },
            grid: { display: false },
          }
        },
        plugins: { legend: { display: false } }
      }
    });
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const dataURL = off.toDataURL('image/png', 1.0);
      tmp.destroy();
      resolve(dataURL);
    }));
  });
}

// ── PDF programático ──────────────────────────────────────────────
async function buildPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const PW = 210, PH = 297, ML = 14, MR = 14, MT = 10, MB = 16;
  const USW = PW - ML - MR, BLIMIT = PH - MB;

  const C = {
    primary: [24,95,165], primaryDark: [15,61,110], primaryLight: [234,243,252],
    white: [255,255,255], g900: [17,24,39], g700: [55,65,81],
    g500: [107,114,128], g400: [156,163,175], g200: [229,231,235], g50: [249,250,251],
  };
  const LVL = [
    { t:[179,72,38],  b:[254,240,235] }, { t:[138,82,16],  b:[254,247,236] },
    { t:[53,96,16],   b:[240,248,230] }, { t:[15,77,138],  b:[234,243,252] },
  ];

  const scores     = selections.map(s => s + 1);
  const avg        = scores.reduce((a, b) => a + b, 0) / scores.length;
  const chartImg   = await getHighResChartImage();
  const displayOrg = orgName || 'Mi organización';

  let y = MT;

  const fill   = (...rgb) => doc.setFillColor(...rgb);
  const stroke = (...rgb) => doc.setDrawColor(...rgb);
  const color  = (...rgb) => doc.setTextColor(...rgb);
  const bold   = sz => { doc.setFont('helvetica','bold');       doc.setFontSize(sz); };
  const normal = sz => { doc.setFont('helvetica','normal');     doc.setFontSize(sz); };
  const bital  = sz => { doc.setFont('helvetica','bolditalic'); doc.setFontSize(sz); };

  function drawPageHeader() {
    bold(8.5);   color(...C.primary);
    doc.text(displayOrg, ML, y + 5);
    normal(7.5); color(...C.g400);
    doc.text(`${CONFIG.workshop}  ·  ${CONFIG.brand}`, PW - MR, y + 5, { align: 'right' });
    y += 9;
    stroke(...C.g200); doc.setLineWidth(0.3);
    doc.line(ML, y, PW - MR, y);
    y += 6;
  }

  function newPage() { doc.addPage(); y = MT; drawPageHeader(); }
  function ensure(h) { if (y + h > BLIMIT) newPage(); }

  drawPageHeader();

  bold(15); color(...C.primaryDark);
  doc.text(CONFIG.pdfTitle, PW / 2, y, { align: 'center' });
  y += 6;
  normal(10); color(...C.g500);
  doc.text(displayOrg, PW / 2, y, { align: 'center' });
  y += 9;

  const heroW = 100, heroH = 42, heroX = (PW - heroW) / 2;
  fill(...C.primary);
  doc.roundedRect(heroX, y, heroW, heroH, 5, 5, 'F');
  bold(6.5); color(200,220,245);
  doc.text(CONFIG.pdfEyebrow, PW / 2, y + 9, { align: 'center' });
  bold(28); color(...C.white);
  doc.text(`${avg.toFixed(1)} / 4.0`, PW / 2, y + 24, { align: 'center' });
  bold(9); color(...C.white);
  const stageStr = getStageLabel(avg);
  const pillW    = doc.getTextWidth(stageStr) + 12;
  fill(10,55,115);
  doc.roundedRect((PW - pillW) / 2, y + 30, pillW, 7.5, 2, 2, 'F');
  doc.text(stageStr, PW / 2, y + 35.5, { align: 'center' });
  y += heroH + 8;

  ensure(100);
  bold(10); color(...C.g700);
  doc.text(CONFIG.pdfChartTitle, PW / 2, y, { align: 'center' });
  y += 5;
  doc.addImage(chartImg, 'PNG', ML, y, USW, USW * 420 / 900);
  y += USW * 420 / 900 + 10;

  ensure(14);
  bold(12); color(...C.g900);
  doc.text(CONFIG.pdfDimTitle, ML, y);
  y += 9;

  const LH = 4.6;
  DIMS.forEach((dim, i) => {
    const lvlIdx  = selections[i];
    const score   = scores[i];
    const lc      = LVL[lvlIdx];
    const hasNext = lvlIdx < 3;
    const todayTxt = dim.levels[lvlIdx].detail || dim.levels[lvlIdx].desc;
    const nextTxt  = hasNext
      ? `N${lvlIdx+2} · ${dim.levels[lvlIdx+1].name}: ${dim.levels[lvlIdx+1].detail || dim.levels[lvlIdx+1].desc}`
      : CONFIG.pdfMaxLevel;

    normal(9);
    const todayLines = doc.splitTextToSize(todayTxt, USW - 24);
    const nextLines  = doc.splitTextToSize(nextTxt,  USW - 24);
    const cardH = 6 + 6 + 5 + todayLines.length * LH + 5 + 5 + nextLines.length * LH + 5;

    ensure(cardH + 3);
    fill(...C.g50); stroke(...C.g200); doc.setLineWidth(0.25);
    doc.roundedRect(ML, y, USW, cardH, 3, 3, 'FD');
    fill(...lc.t); doc.rect(ML, y, 4, cardH, 'F');
    fill(...C.g50);
    doc.rect(ML, y, 2, 3, 'F');
    doc.rect(ML, y + cardH - 3, 2, 3, 'F');

    let cy = y + 6;
    bold(10); color(...C.g900);
    doc.text(dim.title, ML + 8, cy);

    const chipLabel = `N${score} · ${dim.levels[lvlIdx].name}`;
    bold(7.5);
    const chipW = doc.getTextWidth(chipLabel) + 8;
    const chipX = PW - MR - chipW;
    fill(...lc.b);
    doc.roundedRect(chipX, y + 2.5, chipW, 6, 2, 2, 'F');
    color(...lc.t);
    doc.text(chipLabel, chipX + chipW / 2, y + 6.8, { align: 'center' });
    cy += 6;

    bold(7); color(...C.g400);
    doc.text(CONFIG.pdfTodayLabel, ML + 8, cy);
    cy += 4.5;
    normal(9); color(...C.g700);
    todayLines.forEach(l => { doc.text(l, ML + 8, cy); cy += LH; });

    cy += 2;
    stroke(...C.g200); doc.setLineWidth(0.2);
    doc.line(ML + 8, cy, PW - MR - 3, cy);
    cy += 4;

    bold(7); color(...C.g400);
    doc.text(CONFIG.pdfNextLabel, ML + 8, cy);
    cy += 4.5;
    normal(9); color(...C.g700);
    nextLines.forEach(l => { doc.text(l, ML + 8, cy); cy += LH; });

    y = cy + 5;
  });

  normal(9.5);
  const quoteLines = doc.splitTextToSize(CONFIG.footerQuote, USW - 18);
  const quoteH     = quoteLines.length * 5.2 + 12;
  ensure(quoteH + 6);
  fill(...C.primaryLight);
  doc.roundedRect(ML, y, USW, quoteH, 3, 3, 'F');
  fill(...C.primary); doc.rect(ML, y, 4, quoteH, 'F');
  bital(9.5); color(...C.primaryDark);
  let qy = y + 8;
  quoteLines.forEach(l => { doc.text(l, ML + 10, qy); qy += 5.2; });
  y += quoteH + 7;

  ensure(6);
  normal(7.5); color(...C.g400);
  doc.text(`Generado el ${new Date().toLocaleDateString('es-MX', { year:'numeric', month:'long', day:'numeric' })}`, PW / 2, y, { align: 'center' });

  return doc;
}

async function downloadPDF() {
  const btn = $('btn-pdf');
  btn.disabled = true;
  showLoading('Generando PDF…');
  try {
    const doc = await buildPDF();
    doc.save('diagnostico-madurez-v2a.pdf');
    showToast('✅ PDF descargado correctamente');
  } catch (err) {
    console.error(err);
    showToast('❌ Error al generar el PDF. Intenta de nuevo.');
  } finally {
    hideLoading();
    btn.disabled = false;
  }
}

// ── Email ─────────────────────────────────────────────────────────
async function sendEmail() {
  const emailInput = $('email-input');
  const email = (emailInput.value || '').trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showToast('⚠️ Ingresa un correo electrónico válido'); return;
  }
  const btn = $('btn-email');
  btn.disabled = true;
  showLoading('Preparando resultados…');
  try {
    const scores = selections.map(s => s + 1);
    const avg    = scores.reduce((a, b) => a + b, 0) / scores.length;

    const doc       = await buildPDF();
    const pdfBase64 = doc.output('datauristring').split(',')[1];

    const payload = {
      email:   email,
      orgName: orgName || 'Mi organización',
      score:   avg.toFixed(1),
      stage:   getStageLabel(avg),
      dimensions: DIMS.map((d, i) => ({
        title:  d.title,
        level:  d.levels[selections[i]].name,
        detail: d.levels[selections[i]].detail || d.levels[selections[i]].desc,
      })),
      q1:        ($('q1-input').value || '').trim(),
      q2:        ($('q2-input').value || '').trim(),
      pdfBase64: pdfBase64,
    };
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    });
    showToast('✅ ¡Resultados enviados! Revisa tu correo en unos minutos.');
    emailInput.value = '';
  } catch (err) {
    console.error(err);
    showToast('❌ No se pudo guardar. Intenta de nuevo.', 4000);
  } finally {
    hideLoading();
    btn.disabled = false;
  }
}

// ── Teclado ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!$('screen-assessment').classList.contains('active')) return;
  if (e.key >= '1' && e.key <= '4') selectLevel(parseInt(e.key) - 1);
  if (e.key === 'Enter' && selections[currentStep] !== null) goNext();
  if (e.key === 'ArrowLeft') goBack();
});

// ── Init ──────────────────────────────────────────────────────────
applyConfig();
</script>
